<!DOCTYPE html>
<html>

<head>

    <title>Signup</title>

    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

    <div class="container">

        <h1>Create Account</h1>

        <input
            type="text"
            id="name"
            placeholder="Full Name"
        >

        <input
            type="text"
            id="employeeId"
            placeholder="Employee ID"
        >

        <input
            type="text"
            id="department"
            placeholder="Department"
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
        >

        <button onclick="signup()">

            Signup

        </button>

        <div class="link">

            <a href="login.html">

                Already have account?

            </a>

        </div>

    </div>

    <script src="js/signup.js"></script>

</body>

</html>
